services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_RUNTIME_DIR: /data
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-application-credentials.json
    command: ["run-bot"]
    volumes:
      - ./.runtime:/data
      - ./gcp-service-account.json:/run/secrets/google-application-credentials.json:ro
    restart: unless-stopped
